services:
  db:
    image: postg:update1
    ports: 
      - 127.0.0.1:5431:5432
    networks:
      - back-end

    environment:
      POSTGRES_USER: app_user1  # Set the PostgreSQL user
      POSTGRES_PASSWORD: DeusVult%21  # Set the PostgreSQL password (IMPORTANT: Use secrets in production!)
      POSTGRES_DB: fem_hope  # Set the initial database name

    volumes:
      - db_data:/var/lib/postgresql/data

    restart: always
  
  api:
    image: api:update_nightly
    ports: 
      - 127.0.0.1:8001:8000
    networks:
      - back-end
      - front-end
    

    restart: always # Ensures the container restarts if it crashes

volumes:
  db_data:  # Define the named volume

networks:
  front-end:
  back-end:
