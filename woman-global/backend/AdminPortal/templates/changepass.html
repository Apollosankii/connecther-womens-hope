{% extends 'portemp.html'%}

{%block content%}
<div class="col-lg-6 col-xl-6">
	<div class="password_change_form">
		<h4>Change Password</h4>
		<form action="{{url_for('reset')}}" method="POST">
			<div class="form-group">
				<label for="exampleInputPassword1">Old Password</label>
				<input type="password" class="form-control" id="exampleInputPassword1" name="oldpass" placeholder="">
			</div>
			<div class="form-group">
				<label for="exampleInputPassword2">New Password</label>
				<input type="password" class="form-control" id="exampleInputPassword2" name="newpass" placeholder="">
			</div>
			<div class="form-group">
				<label for="exampleInputPassword3">Confirm Password</label>
				<input type="password" class="form-control" id="exampleInputPassword3" name="newpassconf" placeholder="">
			</div>
			<button type="submit" class="btn btn-thm">Save Changes</button>
		</form>
	</div>
</div>
{%endblock%}
