{%extends 'portemp.html'%}

{%block content%} 
<div class="col-sm-12 col-lg-8 col-xl-9">
    <div class="my_profile_form_area">
        <form action="{{url_for('beneficiaryupdate')}}" method="POST">
        <div class="row">
            
            <div class="col-lg-12">
                <h4 class="fz20 mb20">{{beneficiary.name}}</h4>
            </div>
            <div class="col-lg-12">
                <div class="my_profile_thumb_edit"></div>
            </div>
            
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput1">Full Name</label>
                    <input type="text" readonly class="form-control" id="formGroupExampleInput1" value="{{beneficiary.name}}">
                </div>
            </div>

            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput2">Relationship</label>
                    <input type="text" readonly class="form-control" id="exampleFormControlInput2" name="physical" value='{{beneficiary.relationship}}'>
                </div>
            </div>

            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">ID/BIRTH CERTIFICATE Number</label>
                    <input type="text" readonly class="form-control" id="formGroupExampleInput2" name="idnum" value="{{beneficiary.idno}}">
                </div>
            </div>

            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput2">Date of Birth</label>
                    <input type="text" readonly class="form-control" id="exampleFormControlInput2"  value='{{beneficiary.dob}}'>
                </div>
            </div>

            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleInputPhone"> Beneficiary Phone</label>
                    <input type="text" class="form-control" name="benphone" id="exampleInputPhone" aria-describedby="phoneNumber" value="{{beneficiary.contact}}">
                </div>
            </div>

            

                                    {#GAURDIAN DETAILS#}
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput2">Gaurdian Name</label>
                    <input type="text" readonly class="form-control" id="exampleFormControlInput2"  value='{{beneficiary.gaurdname}}'>
                </div>
            </div>
               
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput2">Gaurdian Relationship</label>
                    <input type="text" readonly class="form-control" id="exampleFormControlInput2" name="physical" value='{{beneficiary.gaurdrlsp}}'>
                </div>
            </div>

            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput2">Gaurdian ID</label>
                    <input type="text" readonly class="form-control" id="exampleFormControlInput2"  value='{{beneficiary.gaurdidno}}'>
                </div>
            </div>
            
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleInputPhone"> Gaurdian Contact</label>
                    <input type="text" class="form-control" name="gaurdphone" id="exampleInputPhone" aria-describedby="phoneNumber" value="{{beneficiary.gaurdcontact}}">
                </div>
            </div>
            
             
            <div class="col-lg-4">
                <div class="my_profile_input">
                    <button type="submit" class="btn btn-log btn-block btn-dark">Save Changes</button>									
                </div>
            </div>
        
        </div>
    </form>
    </div>
</div>

{%endblock%}
