{%extends 'portemp.html'%}

{%block content%} 
<div class="col-sm-12 col-lg-8 col-xl-9">
    <div class="my_profile_form_area">
        <form action="{{url_for('update_service',service_id=service.service_id)}}" method="POST">
           {# <!-- <form action="{{url_for('profileupdate')}}" method="POST"> -->#}
        <div class="row">
            
            <div class="col-lg-12">
                <h4 class="fz20 mb20">Service</h4>
            </div>
            <div class="col-lg-12">
                <div class="my_profile_thumb_edit"></div>
            </div>
            
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput1">Service Name</label>
                    <input type="text" readonly class="form-control" id="formGroupExampleInput1" value="{{service.name}}">
                </div>
            </div>
            
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleInputPhone">Minimum Price</label>
                    <input type="text" class="form-control" name="min_price" id="exampleInputPhone" aria-describedby="min price" value="{{service.min_price}}">
                </div>
            </div>
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput1">Service Description</label>
                    <input type="text" class="form-control" id="exampleFormControlInput1" name='description' value="{{service.description}}">
                </div>
            </div>
            
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Service Category</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2" name="category" value="Domestic">
                </div>
            </div>
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput1">Country</label>
                    <input type="text" readonly class="form-control" id="formGroupExampleInput1" value="Kenya">
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="my_profile_input">
                    <button type="submit" class="btn btn-log btn-block btn-dark">Save Changes</button>									
                </div>
            </div>
        
        </div>
    </form>
    </div>
</div>

{%endblock%}
