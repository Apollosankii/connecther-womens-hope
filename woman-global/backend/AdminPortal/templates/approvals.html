{%extends 'portemp.html'%} {%block content%}
<div class="col-sm-12 col-lg-8 col-xl-9">
    <div class="row">
        <div class="col-lg-12">
            <h4 class="fz20 mb30">Approvals</h4>
        </div>
        <div class="col-lg-12">
            <div class="candidate_job_reivew style2">
                <div class="table-responsive job_review_table mt0">
                    <table class="table">
                        <thead class="thead-light">
                            <tr>
                                <th scope="col">First Name</th>
                                <th scope="col">Last Name</th>
                                <th scope="col">Phone</th>
                                <th scope="col">Email</th>
                                <th scope="col">Approve</th>
                                
                            </tr>
                        </thead>
                        <tbody>
                            {%for approval in approvals%}
                            <tr>
                                <th scope="row">{{approval.first_name}}</th>
                                <td>{{approval.last_name}}</td>
                                <td>{{approval.phone}}</td>
                                <td>{{approval.email}}</td>
                                <td><a href="{{url_for('approve_page',user_id=approval.user_id)}}" style="color: pink">View</a></td>
                            </tr>
                            {%endfor%}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
{%endblock content%}
