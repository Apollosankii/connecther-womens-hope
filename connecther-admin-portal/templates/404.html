{%extends 'base.html'%}

{%block content %}
<!-- Our Error Page -->
<section class="our-error bgc-fa">
    <div class="container">
        <div class="row">
            <div class="col-lg-10 offset-lg-1 text-center">
                <div class="error_page newsletter_widget">
                    <div class="erro_code"><img class="img-fluid" src="{{url_for('static', filename='images/resource/404.jpg')}}" alt="404.png"></div>
                    <h4>Sorry, No Such User Exists</h4>
                    <p>Unfortunately the details you submitted could not match any records we have. Please contact your system administrator or drop your email below and someone will be in touch .</p>
                    <form class="form-inline mailchimp_form">
                        <label class="sr-only" for="inlineFormInputMail3">Name</label>
                        <input type="email" class="form-control mb-2 mr-sm-2" id="inlineFormInputMail3" placeholder="Enter your email address">
                        <button type="submit" class="btn btn-primary mb-2"><span class="fa fa-paper-plane-o"></span></button>
                    </form>
                </div>
                <a class="text-thm mt25" href="{{url_for('home')}}">Back to Homepage <span class="flaticon-right-arrow pl10"></span></a>
            </div>
        </div>
    </div>
</section>
{%endblock%}
