{%extends 'portemp.html'%}

{%block content%} 
<div class="col-sm-12 col-lg-8 col-xl-9">
    <div class="my_profile_form_area">
        <form action="{{url_for('add_provider')}}" method="POST" enctype="multipart/form-data">
           {# <!-- <form action="{{url_for('profileupdate')}}" method="POST"> -->#}
        <div class="row">
            
            <div class="col-lg-12">
                <h4 class="fz20 mb20">Create a Service Provider</h4>
            </div>
            <div class="col-lg-12">
                <div class="my_profile_thumb_edit"></div>
            </div>
            <div class="col-lg-12">
                <div>
                    <h5>Profile Photo</h5>
                </div>
                <div class="avatar-upload mb30">
                    <div class="avatar-edit">
                        <input class="btn btn-thm" name='profpic' type='file' id="imageUpload" accept=".png, .jpg, .jpeg" />
                        <label for="imageUpload"></label>
                    </div>
                    <div class="avatar-preview">
                        <div id="imagePreview"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="exampleInputPhone">First Name</label>
                    <input type="text" class="form-control" name="first_name" id="exampleInputPhone" aria-describedby="min price" value="" required="required" placeholder="Jane">
                </div>
            </div>
            
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="exampleInputPhone">Last Name</label>
                    <input type="text" class="form-control" name="last_name" id="exampleInputPhone" aria-describedby="min price" value="" required="required" placeholder="Doe">
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="exampleFormControlInput1">Phone</label>
                    <input type="text" class="form-control" id="exampleFormControlInput1" name='phone' value="" required="required" placeholder="0712 345 678">
                </div>
            </div>
            
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Gender</label>
                    <input type="text" readonly class="form-control" id="formGroupExampleInput2" name="gender" value="Female">
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_select_box form-group">
                    <label for="exampleFormControlInput3">Title</label><br>
                    <select class="selectpicker" name="title">
                        <option>Mrs</option>
                        <option>Ms</option>
                        <option>Mr</option>
                        <option>Sir</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Email</label>
                    <input type="email" class="form-control" id="formGroupExampleInput2" name="email" value="" placeholder="abc@xyz.com">
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput1">Date of Birth</label>
                    <input type="text" class="form-control" id="formGroupExampleInput1" name="dob" value="" required="required" placeholder="dd/MM/YYYY" >
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Country</label>
                    <input type="text" readonly class="form-control" id="formGroupExampleInput2" name="country" value="Kenya">
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_select_box form-group">
                    <label for="exampleFormControlInput3">County</label><br>
                    <select class="selectpicker" name="county">
                        <option>Nairobi</option>
                        <option>Kiambu</option>
                        <option>Mombasa</option>
                        <option>Kisumu</option>
                        <option>Meru</option>
                        <option>Kakamega</option>
                    </select>
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">National ID</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2" name="nat_id" value="" required="required">
                </div>
            </div>
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Emmergency Contact 1</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2" name="emm_cont_1" value="" placeholder="">
                </div>
            </div>
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Emmergency Contact 2</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2" name="emm_cont_2" value="" placeholder="">
                </div>
            </div>
            
            <div class="col-md-6 col-lg-6">
                <div class="my_profile_input form-group">
                    <label for="formGroupExampleInput2">Area Name</label>
                    <input type="text" class="form-control" id="formGroupExampleInput2" name="mtaa" value="" placeholder="Home Area Name/ Popular Stage">
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="exampleInputLat">Area Latitude</label>
                    <input type="text" class="form-control" id="exampleInputLat" name="lat" aria-describedby="latNumber" placeholder="51.5073509">
                </div>
            </div>
            <div class="col-md-4 col-lg-4">
                <div class="my_profile_input form-group">
                    <label for="exampleInputLat">Area Longitude</label>
                    <input type="text" class="form-control" id="exampleInputLat" name="long" aria-describedby="latNumber" placeholder="-0.12775829999998223">
                </div>
            </div>
            
            </div> 
            
        </div>
        <div class="row">
            <div class="col-lg-12">
                <h4 class="fz20 mb20">Document Uploads</h4>
            </div>
            {%for document in documents %}
            <div class="col-lg-6 col-md-6">
                <div>
                    <h5>{{document.name}}</h5>
                </div>
                <div class="avatar-upload mb30">
                    <div class="avatar-edit">
                        <label for="imageUpload"></label>
                        <input class="btn btn-thm" name="{{document.docType}}" type='file' id="imageUpload" accept=".png, .jpg, .jpeg, .pdf" />
                        
                    </div>
                    <div class="avatar-preview">
                        <div id="imagePreview"></div>
                    </div>
                </div>
            </div>
            {%endfor%}
        <div class="row">
                <div class="col-lg-12">
                    <h4 class="fz20 mb20">Service(s) Offered</h4>
                </div>
                <div class="col-lg-12">
                        {%for service in services%}
                        <div class="custom-control custom-switch">
                            <input type="checkbox" class="custom-control-input" id="customSwitch{{service.service_id}}" name="subscriptions" value="{{service.service_id}}">
                            <label class="custom-control-label" for="customSwitch{{service.service_id}}">{{service.name}}</label>
                        </div>
                        {%endfor%}
                    
                </div>   
        </div>
        <div>
            <br> </br>
            <br> </br>
        </div>
    <div class="col-lg-12">
        <div class="col-lg-4">
            <div class="my_profile_input">
                <button type="submit" class="btn btn-log btn-block btn-dark">Save Changes</button>									
            </div>
        </div>
    </div>
    </form>
    </div>
</div>

{%endblock%}
