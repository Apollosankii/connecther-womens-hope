{%extends 'portemp.html'%}
{%block content%}
<div class="col-lg-8 col-xl-9 ch-main-content">
    <div class="ch-page-header">
        <div>
            <h2 class="ch-page-title">Services</h2>
            <p class="ch-page-subtitle">Service catalog offered through ConnectHer</p>
        </div>
        <a href="{{url_for('add_service_page')}}" class="ch-btn-sm" style="background:var(--ch-text);color:#fff;border:none;">+ Add Service</a>
    </div>

    <div class="row">
        {%for service in services%}
        <div class="col-sm-6 col-xl-6">
            <div class="ch-service-card">
                <div class="ch-service-id">#{{service.service_id}}</div>
                <h4 class="ch-service-name">{{service.name}}</h4>
                <p class="ch-service-desc">{{service.description}}</p>
                <div class="ch-service-footer">
                    <span class="ch-service-price"><span class="flaticon-money"></span> KES {{service.min_price}}</span>
                    <span class="ch-service-loc"><span class="flaticon-location-pin"></span> Kenya</span>
                    <a href="{{url_for('service',service_id=service.service_id)}}" class="ch-btn-sm" style="margin-left:auto;">View</a>
                    <form action="{{ url_for('delete_service', service_id=service.service_id) }}" method="POST" style="margin-left:8px;"
                          onsubmit="return confirm('Delete service \"{{ service.name }}\"? This cannot be undone.');">
                        <button type="submit" class="ch-btn-sm" style="background:#dc3545;color:#fff;border:none;">Delete</button>
                    </form>
                </div>
            </div>
        </div>
        {%endfor%}
    </div>
</div>
{%endblock%}
