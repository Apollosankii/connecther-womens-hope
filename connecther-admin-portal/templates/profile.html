{%extends 'portemp.html'%}
{%block content%}
<div class="col-sm-12 col-lg-8 col-xl-9 ch-main-content">
    <div class="ch-page-header">
        <h2 class="ch-page-title">My Profile</h2>
        <p class="ch-page-subtitle">Manage your admin account details</p>
    </div>

    <form action="#" method="POST">
    <div class="ch-card">
        <div class="ch-card-header">
            <h5 class="ch-card-title">Personal Information</h5>
        </div>
        <div class="ch-card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Full Name</label>
                        <div class="ch-field-value">{{user.name}}</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">ID Number</label>
                        <div class="ch-field-value"><code class="ch-code">{{user.id}}</code></div>
                        <input type="hidden" name="idnum" value="{{user.id}}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Gender</label>
                        <div class="ch-field-value">{{user.gender}}</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Phone</label>
                        <input type="text" class="form-control" name="phone" value="{{user.phone}}"
                            style="background:var(--ch-bg-card);border:1px solid var(--ch-border);color:var(--ch-text);border-radius:var(--ch-radius-sm);padding:0.625rem 0.875rem;">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Email Address</label>
                        <input type="email" class="form-control" name="email" value="{{user.email}}"
                            style="background:var(--ch-bg-card);border:1px solid var(--ch-border);color:var(--ch-text);border-radius:var(--ch-radius-sm);padding:0.625rem 0.875rem;">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Registration Date</label>
                        <div class="ch-field-value">{{user.regdate}}</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">KRA PIN</label>
                        <div class="ch-field-value">{{user.pin}}</div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Postal Address</label>
                        <input type="text" class="form-control" name="postal" value="{{user.postal}}"
                            style="background:var(--ch-bg-card);border:1px solid var(--ch-border);color:var(--ch-text);border-radius:var(--ch-radius-sm);padding:0.625rem 0.875rem;">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="ch-field">
                        <label class="ch-field-label">Physical Address</label>
                        <input type="text" class="form-control" name="physical" value="{{user.physicaladd}}"
                            style="background:var(--ch-bg-card);border:1px solid var(--ch-border);color:var(--ch-text);border-radius:var(--ch-radius-sm);padding:0.625rem 0.875rem;">
                    </div>
                </div>
            </div>
        </div>
        <div class="ch-card-footer" style="display:flex;justify-content:flex-end;">
            <button type="submit" class="btn-thm" style="border:none;cursor:pointer;padding:0.65rem 2rem;font-size:0.9375rem;">Save Changes</button>
        </div>
    </div>
    </form>
</div>
{%endblock%}
